services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────
  # ARM64-compatible via multi-arch official image
  # Host port 5435 — avoids Pi conflicts on 5432/5434; used for local alembic and pytest
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m

  # ── Redis 7 ──────────────────────────────────────────────────────
  # ARM64-compatible via multi-arch official image
  # Host port 6380 — exposed for local pytest health checks; avoids Pi conflict on 6379
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 64m

  # ── MinIO ────────────────────────────────────────────────────────
  # ARM64-compatible multi-arch image; console on :9001
  # Host ports: 9190 (API) and 9191 (console) — avoids Pi conflicts on 9000/9001
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9190:9000"
      - "9191:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 256m

  # ── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+asyncpg://hscai:change_me_in_production@postgres:5432/hscai_test}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m

  # ── Next.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    mem_limit: 512m

  # ── Nginx reverse proxy ──────────────────────────────────────────
  # Routes /api/* → backend:8000 and /* → frontend:3000
  # Host port 3090 — avoids Pi conflict on 80
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3090:80"
    depends_on:
      - backend
      - frontend
    mem_limit: 32m

  # ── OCR worker (heavy — use `docker compose --profile ocr up`) ───
  # Deferred to Milestone 6. Profile keeps it off by default.
  # ocr-worker:
  #   profiles: ["ocr"]
  #   ...

  # ── AI worker (deferred to Milestone 7) ──────────────────────────
  # ai-worker:
  #   profiles: ["ai"]
  #   ...

volumes:
  postgres_data:
  redis_data:
  minio_data:
